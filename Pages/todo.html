        <h1>Dashboard</h1>

     <section>
        <h2>To-do List</h2>
        <p>This is the to-do list page of the dashboard. Use the menu to navigate to different sections.</p>
            <form action="./todo.html"id ="form1" method="post">
                <input type="text" id="task" name="tasks" placeholder="Enter a new task">
                <input type="checkbox" id="checked" name="checked">
                 <label for="checked" name="task">Completed</label>
                <button id="add-btn" type="submit" value="submit" formmethod="get" onclick="addBtn()">Add Task</button>
                <button id="delete-btn"type='button' onclick="deleteBtn()">Delete</button>
                <button id="edit-btn" type="button"="editBtn()">Edit</button>
            </form>

            <div id="task-list">
                <h1>Tasks:</h1>
                <p id="task-item"></p>
            </div>
    </section>
