<!DOCTYPE html>

    <script src="../Pages/counter.js"></script>
</head>
<body>
    <div class="container">
        <h1>Dashboard</h1>
        <menu class="menu-list">
            <li class="menu-item"><a href="../index.html"><i class="fas fa-home"></i> Home</a></li>

        </menu>
    </div>
     <section>
        <h2>Counter</h2>
        <p>This is the counter page of the dashboard. Use the menu to navigate to different sections.</p>
        <div id="counter">
            <button id="decrement" onclick="decrement()">-</button>
            <span id="count">0</span>
            <button id="increment" onclick="increment()">+</button>
            <script>
                let count = 0;
                const countElement = document.getElementById('count');

                function increment() {
                    count++;
                    countElement.textContent = count;
                }

                function decrement() {
                    count--;
                    countElement.textContent = count;
                }
            </script>
        </div>
    </section>
</body>
</html>
